kind = "web"
previewPath = "/smm/"
title = "BM SocialMedia Hub"
version = "1.0.0"
id = "artifacts/smm-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/smm/" ]
localPort = 19550

[services.development]
run = "pnpm --filter @workspace/smm-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smm-site", "run", "build" ]
publicDir = "artifacts/smm-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19550"
BASE_PATH = "/smm/"
