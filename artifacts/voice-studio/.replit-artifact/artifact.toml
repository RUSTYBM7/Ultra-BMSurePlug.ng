kind = "web"
previewPath = "/voice-studio/"
title = "BMsureplug Voice Studio"
version = "1.0.0"
id = "artifacts/voice-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/voice-studio/" ]
localPort = 21159

[services.development]
run = "pnpm --filter @workspace/voice-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voice-studio", "run", "build" ]
publicDir = "artifacts/voice-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21159"
BASE_PATH = "/voice-studio/"
